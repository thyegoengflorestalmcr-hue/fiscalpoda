        :root { 
            --primary: #059669; 
            --primary-dark: #064e3b;

        .elite-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;

            background: radial-gradient(circle at center, rgba(16, 185, 129, 0.1) 0%, transparent 70%);

        .radpoda-card {

            border-radius: 2.5rem;

        }

        .btn-active:active { transform: scale(0.96); }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .rule-card { 
            border-left: 8px solid transparent;
            transition: all 0.3s ease;

        .rule-card:hover { border-left-width: 12px; transform: translateX(4px); }

        .pulse-severe { animation: pulse-severe 2s infinite; border: 2px solid var(--accent); }
        @keyframes pulse-severe { 
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); } 
            70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } 
        }

        input, select, textarea {
            border-radius: 1.25rem !important;
            border: 2px solid #e2e8f0 !important;
            transition: all 0.2s !important;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15) !important;
            background: white !important;
        }

        .status-badge {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 9999px;
            letter-spacing: 0.05em;
        }

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const FISCAIS_AUTH = { 'DANIELA FERNANDA DEWES DE FREITAS':'daniela123', 'SANDRA DE OLIVEIRA':'sandra123', 'AIRTON ANTÔNIO BOHNEN':'airton123' };
const EMAIL_DESTINO = 'danieladefreitasmcr@gmail.com';
const HMAC_KEY = 'MCR_RAD_THYEGO_INTEGRITY_2025';

const GLOSA_RULES = [
    {id:99,group:'CONFORMIDADE',glosa:'0.00%',cat:'Vistoria Conforme',desc:'Ateste in loco sem ocorrência de glosa.',howTo:'Registre o local com foto, comprovando que a execução está de acordo com as diretrizes e regras de segurança para respaldo ao TCE.'},

    {id:1,group:'QUALIDADE',glosa:'0.50%',cat:'Qualidade Técnica',desc:'Execução em desacordo com normas ou OS.',howTo:'Verifique o padrão da poda. Colete fotos mostrando a falha técnica ou desvio da OS.'},
    {id:2,group:'QUALIDADE',glosa:'0.50%',cat:'Prazos e Limpeza',desc:'Atraso na conclusão ou limpeza (>24h).',howTo:'Registre resíduos no local após 24h. Tire foto do logradouro com galhos acumulados.'},
    {id:3,group:'QUALIDADE',glosa:'0.50%',cat:'Impacto Público',desc:'Reclamações não resolvidas no prazo.',howTo:'Anote o protocolo da reclamação. Fotografe a situação não resolvida.'},
    {id:4,group:'QUALIDADE',glosa:'8.00%',cat:'Inexecução Gravíssima',desc:'Recusa ou abandono de serviço.',howTo:'Documente local vazio ou paralisação injustificada. Fotografe sem equipe no horário.'},
    {id:5,group:'QUALIDADE',glosa:'8.00%',cat:'Dano Ambiental',desc:'Supressão sem autorização prévia.',howTo:'Cruze com licenciamento. Fotografe o tronco e ausência de placa de supressão.'},
    {id:6,group:'QUALIDADE',glosa:'0.10%',cat:'Capacidade Insuficiente',desc:'Falta de equipe ou equipamentos.',howTo:'Conte auxiliares e motosserristas em campo. Compare com o mínimo do edital. Fotografe a equipe completa.'},
    {id:7,group:'SEGURANÇA',glosa:'8.00%',cat:'Acidente Gravíssimo',desc:'Acidente com afastamento ou danos.',howTo:'Registre imediatamente. Fotos detalhadas de danos a terceiros ou lesão física.'},
    {id:8,group:'SEGURANÇA',glosa:'2.00%',cat:'Uso de EPIs',desc:'Falta ou uso inadequado de proteção.',howTo:'Identifique trabalhadores sem capacete, luvas, botas ou cinto. Foque na infração.'},
    {id:9,group:'SEGURANÇA',glosa:'3.00%',cat:'Sinalização e EPCs',desc:'Falha no isolamento coletivo.',howTo:'Verifique ausência de cones, placas ou fitas. Fotografe a rua sem isolamento.'},
    {id:10,group:'SEGURANÇA',glosa:'1.00%',cat:'Falta de DDS',desc:'Início sem registro do DDS.',howTo:'Cobre o registro do Diálogo Diário de Segurança. Se operando sem DDS assinado, aplique.'},
    {id:11,group:'GESTÃO',glosa:'0.50%',cat:'Registro Diário',desc:'Atraso no envio do formulário online.',howTo:'Verifique se dados do dia anterior foram transmitidos.'},
    {id:12,group:'GESTÃO',glosa:'1.50%',cat:'Relatório Mensal',desc:'Atraso ou RAM incompleto.',howTo:'Considere a data limite. Aplique se houver falta de fotos ou dados incompletos.'},
    {id:13,group:'GESTÃO',glosa:'8.00%',cat:'Fraude Contratual',desc:'Manipulação dolosa de registros.',howTo:'Identifique fotos duplicadas, GPS falsificado ou protocolos repetidos. Documente a evidência.'},
    {id:14,group:'GESTÃO',glosa:'1.00%',cat:'Gestão Administrativa',desc:'Não atendimento a pedidos formais.',howTo:'Liste o ofício não respondido no prazo de 48h.'},
    {id:15,group:'CONTROLE',glosa:'0.50%',cat:'GPS Inoperante',desc:'Veículo em serviço sem rastreamento.',howTo:'Confira rastreio. Tire print mostrando o veículo offline.'},
    {id:16,group:'CONTROLE',glosa:'1.50%',cat:'Licenças e NRs',desc:'Operadores ou máquinas sem licença.',howTo:'Solicite NR-35/NR-10 ou LOP da motosserra. Fotografe documento vencido.'},
    {id:17,group:'CONTROLE',glosa:'8.00%',cat:'Discrepância Auditada',desc:'Divergência entre RAD e Auditoria.',howTo:'Use quando o relatório declarar algo inexistente no local. Documente a evidência.'}
];

const App = () => {
    const [view, setView] = useState('fiscal');
    const [fiscal, setFiscal] = useState('');
    const [loginSenha, setLoginSenha] = useState('');
    const [loginSelect, setLoginSelect] = useState('');
    const [selectedRule, setSelectedRule] = useState(null);
    const [endereco, setEndereco] = useState('');
    const [enderecoLoading, setEnderecoLoading] = useState(false);
    const [relato, setRelato] = useState('');
    const [fotos, setFotos] = useState([null,null,null]);
    const [gps, setGps] = useState({lat:null,lng:null,status:'searching'});
    const [loading, setLoading] = useState(false);
    const [history, setHistory] = useState([]);

    // Data/hora do início da ocorrência — auto EXIF ou manual
    const nowDate = () => new Date().toISOString().split('T')[0];
    const nowTime = () => new Date().toTimeString().slice(0,5);
    const [visitaData, setVisitaData] = useState(nowDate);
    const [visitaHora, setVisitaHora] = useState(nowTime);
    // Período de permanência da glosa (definido pelo fiscal)
    const [glosaFimData, setGlosaFimData] = useState(nowDate);
    const [glosaFimHora, setGlosaFimHora] = useState('18:00');
    // Unidade/OS da glosa
    const [glosaOS, setGlosaOS]     = useState('');
    const [glosaUnid, setGlosaUnid] = useState('');

    const today = new Date().toISOString().split('T')[0];
    const [exportDateFrom, setExportDateFrom] = useState(today);
    const [exportDateTo,   setExportDateTo]   = useState(today);
    const [exportTimeFrom, setExportTimeFrom] = useState('00:00');
    const [exportTimeTo,   setExportTimeTo]   = useState('23:59');

    const requestGps = () => {
        setGps({lat:null, lng:null, status:'searching'});
        if (!navigator.geolocation) {
            alert('Erro: Seu navegador não suporta GPS.');
            setGps(g => ({...g, status:'error'}));
            return;
        }
        navigator.geolocation.getCurrentPosition(
            p => setGps({lat:p.coords.latitude.toFixed(6), lng:p.coords.longitude.toFixed(6), status:'ok'}),
            err => {
                let msg = 'Erro desconhecido.';
                if(err.code === 1) msg = 'Permissão Negada. No celular: abra as Configurações do Chrome/Safari > Permissões de Site > Localização > Permita para este arquivo.';
                if(err.code === 2) msg = 'Sinal de GPS ausente. Vá para uma rua aberta e tente novamente.';
                if(err.code === 3) msg = 'Tempo esgotado. Verifique se a Localização está ativa nas configurações do celular e tente novamente.';
                alert('FALHA NA COLETA DE COORDENADAS TCE:\n' + msg);
                setGps(g => ({...g, status:'error'}));
            },
            { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
        );
    };

    useEffect(() => {
        requestGps();
        loadHistory();
    }, []);

    const loadHistory = async () => {
        const hist = await idbKeyval.get('vistorias_history') || [];
        setHistory(hist.sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp)).slice(0,30));
    };

    // ── Lê EXIF de arquivo de imagem manualmente (sem lib externa) ────────
    const readExif = (file) => new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const view = new DataView(ev.target.result);
                if (view.getUint16(0) !== 0xFFD8) { resolve({}); return; }
                let offset = 2;
                while (offset < view.byteLength) {
                    const marker = view.getUint16(offset);
                    const len = view.getUint16(offset + 2);
                    if (marker === 0xFFE1) { // APP1 - EXIF
                        const exifStr = String.fromCharCode(...new Uint8Array(ev.target.result, offset + 4, 6));
                        if (!exifStr.startsWith('Exif')) { resolve({}); return; }
                        // Tenta extrair data do bloco EXIF de forma simples
                        const raw = new Uint8Array(ev.target.result, offset + 10, len - 8);
                        const str = String.fromCharCode(...raw);
                        const dtMatch = str.match(/(\d{4}):(\d{2}):(\d{2}) (\d{2}):(\d{2}):(\d{2})/);
                        if (dtMatch) {
                            resolve({ dateStr: `${dtMatch[1]}-${dtMatch[2]}-${dtMatch[3]}`, timeStr: `${dtMatch[4]}:${dtMatch[5]}` });
                        } else { resolve({}); }
                        return;
                    }
                    offset += 2 + len;
                }
            } catch(e) {}
            resolve({});
        };
        reader.readAsArrayBuffer(file.slice(0, 128 * 1024)); // lê só os primeiros 128kb
    });

    // ── Reverse geocoding offline-friendly (OpenStreetMap Nominatim) ──────
    const reverseGeocode = async (lat, lng) => {
        try {
            const resp = await fetch(
                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&addressdetails=1`,
                { headers: { 'Accept-Language': 'pt-BR' } }
            );
            const data = await resp.json();
            const a = data.address || {};
            const parts = [a.road, a.house_number, a.suburb || a.neighbourhood, a.city || a.town || a.village];
            return parts.filter(Boolean).join(', ').toUpperCase();
        } catch(e) { return ''; }
    };

    // ── Processa foto: EXIF → data/hora | GPS app → geocoding → endereço ─
    const processPhoto = async (file, index) => {
        if (!file) return;

        // 1. Tenta ler data/hora do EXIF (funciona para fotos da câmera)
        if (index === 0) {
            const exif = await readExif(file);
            if (exif.dateStr) {
                setVisitaData(exif.dateStr);
                if (exif.timeStr) setVisitaHora(exif.timeStr);
            }
            // 2. Auto-preenche endereço via GPS do dispositivo (se disponível e campo vazio)
            if (gps.lat && !endereco.trim()) {
                setEnderecoLoading(true);
                const addr = await reverseGeocode(gps.lat, gps.lng);
                if (addr) setEndereco(addr);
                setEnderecoLoading(false);
            }
        }

        // 3. Renderiza no canvas com watermark
        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                const maxSize = 1280;
                let w = img.width, h = img.height;
                if (w > h && w > maxSize) { h = Math.round(h*maxSize/w); w = maxSize; }
                else if (h > maxSize) { w = Math.round(w*maxSize/h); h = maxSize; }
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                const font = Math.max(12, Math.floor(w/42));
                ctx.font = `bold ${font}px monospace`;
                ctx.fillStyle = 'white'; ctx.shadowColor = 'black'; ctx.shadowBlur = 7;
                const dataHora = `${visitaData} ${visitaHora}`;
                const gpsStr  = gps.lat ? `${gps.lat}, ${gps.lng}` : 'GPS N/D';
                ctx.fillText(`MCR FISCAL | ${dataHora} | ${gpsStr}`, 14, h - 16);
                const finalImg = canvas.toDataURL('image/jpeg', 0.82);
                setFotos(prev => { const f=[...prev]; f[index]=finalImg; return f; });
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    const sendVistoria = async () => {
        if (fotos.filter(Boolean).length === 0) { alert('Anexe pelo menos 1 foto.'); return; }
        if (!relato.trim() || !endereco.trim()) { alert('Preencha o relato e o endereço.'); return; }
        // GPS OBRIGATÓRIO — evita duplicação e permite cruzamento no Gestor
        if (!gps.lat || !gps.lng) {
            alert('⚠️ GPS OBRIGATÓRIO\n\nO registro não pode ser salvo sem coordenadas GPS.\nAguarde o GPS ser encontrado ou ative a localização do dispositivo.');
            return;
        }
        if (!window.confirm('Confirmar o envio desta glosa fiscal?')) return;
        setLoading(true);
        try {
            const tsInicio = new Date(`${visitaData}T${visitaHora}:00`);
            const tsFim    = new Date(`${glosaFimData}T${glosaFimHora}:00`);
            const entry = {
                fiscal, rule_id:selectedRule.id, categoria:selectedRule.cat,
                observacao:relato.toUpperCase(), endereco:endereco.toUpperCase(),
                gps:`${gps.lat},${gps.lng}`,
                lat: parseFloat(gps.lat), lng: parseFloat(gps.lng),
                fotosBase64:fotos.filter(Boolean),
                timestamp:  isNaN(tsInicio) ? new Date().toISOString() : tsInicio.toISOString(),
                periodo_inicio: isNaN(tsInicio) ? new Date().toISOString() : tsInicio.toISOString(),
                periodo_fim:    isNaN(tsFim)    ? null : tsFim.toISOString(),
                os_referencia:  glosaOS.trim().toUpperCase()   || null,
                unidade_ref:    glosaUnid.trim().toUpperCase() || null
            };
            const hist = await idbKeyval.get('vistorias_history') || [];
            await idbKeyval.set('vistorias_history', [...hist, entry]);
            setView('success');
        } catch(e) { alert('Erro ao salvar: '+e.message); }
        finally { setLoading(false); loadHistory(); }
    };

    const limparHistorico = async () => {
        if (!window.confirm('⚠️ ATENÇÃO\n\nIsso irá apagar TODOS os registros locais do histórico.\nExporte o ZIP antes de continuar.\n\nDeseja mesmo limpar?')) return;
        await idbKeyval.set('vistorias_history', []);
        setHistory([]);
        alert('Histórico limpo com sucesso.');
    };

    const b64ToBlob = b64 => {
        const [meta, data] = b64.split(';base64,');
        const mime = meta.split(':')[1];
        const raw = atob(data);
        const arr = new Uint8Array(raw.length);
        for (let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
        return new Blob([arr], {type:mime});
    };

    const exportFiscalZip = async () => {
        const hist = await idbKeyval.get('vistorias_history') || [];
        if (hist.length === 0) { alert('Nenhum registro para exportar.'); return; }

        const from = new Date(`${exportDateFrom}T${exportTimeFrom}:00`);
        const to   = new Date(`${exportDateTo}T${exportTimeTo}:59`);
        const filtered = hist.filter(item => {
            const d = new Date(item.timestamp);
            return d >= from && d <= to;
        });
        if (filtered.length === 0) {
            alert(`Nenhum registro de ${exportDateFrom} ${exportTimeFrom} até ${exportDateTo} ${exportTimeTo}.`);
            return;
        }

        setLoading(true);
        try {
            const zip = new JSZip();
            const imgFolder = zip.folder('EVIDENCIAS_GEORREFERENCIADAS');

            const ncs = filtered.map((item, idx) => {
                const photosPaths = [];
                (item.fotosBase64||[]).forEach((b64,pIdx) => {
                    if (!b64) return;
                    const fn = `NC_${idx}_FOTO_${pIdx}.jpg`;
                    imgFolder.file(fn, b64ToBlob(b64));
                    photosPaths.push(fn);
                });
                const ts   = new Date(item.timestamp);
                const tsFim = item.periodo_fim ? new Date(item.periodo_fim) : null;
                const rule = GLOSA_RULES.find(r => r.id===item.rule_id)||{};
                const latVal = item.lat ?? (item.gps ? parseFloat(item.gps.split(',')[0]) : null);
                const lngVal = item.lng ?? (item.gps ? parseFloat(item.gps.split(',')[1]) : null);
                return {
                    id_nc:`NC_${ts.getTime()}_${idx}`,
                    chave_dedup: `${item.rule_id}_${Math.round(latVal*1000)}_${Math.round(lngVal*1000)}_${ts.toISOString().slice(0,13)}`,
                    timestamp:          item.timestamp,
                    periodo_inicio:     item.periodo_inicio || item.timestamp,
                    periodo_fim:        item.periodo_fim    || null,
                    data_vistoria:      ts.toLocaleDateString('pt-BR'),
                    hora_vistoria:      ts.toLocaleTimeString('pt-BR'),
                    hora_fim_vistoria:  tsFim ? tsFim.toLocaleTimeString('pt-BR') : null,
                    fiscal:             item.fiscal||fiscal,
                    rule_id:            item.rule_id,
                    glosa_percentual:   rule.glosa||'',
                    grupo:              rule.group||'',
                    categoria:          item.categoria,
                    descricao:          item.observacao,
                    endereco:           item.endereco,
                    lat:                latVal,
                    lng:                lngVal,
                    coords:             item.gps||'',
                    os_referencia:      item.os_referencia  || null,
                    unidade_ref:        item.unidade_ref    || null,
                    fotos:              photosPaths
                };
            });

            // 1. Gerar Dados do Relatório (JSON)
            const bundle = {
                versao:'RAD_FISCAL_ELITE_v2', tipo:'AUDITORIA_FISCAL',
                fiscal, periodo_inicio:`${exportDateFrom} ${exportTimeFrom}`,
                periodo_fim:`${exportDateTo} ${exportTimeTo}`,
                data_export:new Date().toISOString(),
                total_naoConformidades:ncs.length, naoConformidades:ncs
            };
            const bundleStr = JSON.stringify(bundle,null,2);

            // 2. Gerar Planilha Oficial de Auditoria (CSV/XLSX)
            const headers = ['DATA','HORA','FISCAL','ITEM TR','% GLOSA','GRUPO','OCORRÊNCIA','DESCRIÇÃO','ENDEREÇO','LAT','LNG','OS / PROTOCOLO','ID ÁRVORE (SISTEMA)'];
            const rows = ncs.map(nc => [nc.data_vistoria,nc.hora_vistoria,nc.fiscal,`Item ${nc.rule_id}`,nc.glosa_percentual,nc.grupo,nc.categoria,nc.descricao,nc.endereco,nc.lat,nc.lng, nc.os_referencia || '', nc.unidade_ref || '']);
            const csvContent = headers.join(";") + "\n" + rows.map(r => r.join(";")).join("\n");

            // 3. Selagem Digital HMAC-SHA256 (JSON + Excel)
            const seal = CryptoJS.HmacSHA256(bundleStr + "[SEP]" + csvContent, HMAC_KEY).toString();
            
            zip.file('AUDITORIA_FISCAL.json', bundleStr);
            zip.file('PLANILHA_ATIVIDADES.csv', "\ufeff" + csvContent);
            zip.file('CERTIFICADO_INTEGRIDADE.txt',
                `SISTEMA RAD FISCAL ELITE v2.0 - CERTIFICADO DE ORIGEM\n` +
                `---------------------------------------------------\n` +
                `AUTOR: Eng. Florestal Thyêgo Nunes Alves Barreto — CREA-PR PE-048841/D\n` +
                `ID_INTEGRIDADE: ${seal}\n` +
                `DATA_GERACAO: ${new Date().toLocaleString('pt-BR')}\n\n` +
                `AVISO DE SEGURANÇA:\n` +
                `Este arquivo ZIP foi selado digitalmente no momento da exportação.\n` +
                `Qualquer tentativa de alterar o arquivo JSON ou a Planilha CSV invalidará esta assinatura.\n` +
                `A selagem protege a integridade forense das evidências fiscais colhidas em campo.`
            );

            // XLSX adicional para compatibilidade
            const ws = XLSX.utils.aoa_to_sheet([headers,...rows]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'FISCALIZACAO');
            zip.file(`AUDITORIA_FISCAL_REVISAO.xlsx`, XLSX.write(wb,{bookType:'xlsx',type:'array'}));

            const blob = await zip.generateAsync({type:'blob'});
            const filename = `RAD_FISCAL_${(fiscal||'FISCAL').replace(/\s+/g,'_')}_${exportDateFrom}_${exportDateTo}.zip`;

            // — Tenta Web Share (mobile) primeiro:
            let shared = false;
            if (typeof navigator.canShare === 'function') {
                try {
                    const zipFile = new File([blob], filename, {type:'application/zip'});
                    if (navigator.canShare({files:[zipFile]})) {
                        await navigator.share({
                            title:'RAD FISCAL — Auditoria',
                            text:`Relatório Fiscal: ${exportDateFrom} ${exportTimeFrom} → ${exportDateTo} ${exportTimeTo}\nFiscal: ${fiscal}`,
                            files:[zipFile]
                        });
                        shared = true;
                    }
                } catch(err) { if (err.name!=='AbortError') console.warn('Share fallback:', err); }
            }

            if (!shared) {
                // Desktop: download + mailto
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename; a.click();
                setTimeout(() => URL.revokeObjectURL(url), 5000);
                const subj = encodeURIComponent(`RAD FISCAL — ${exportDateFrom} ${exportTimeFrom} a ${exportDateTo} ${exportTimeTo}`);
                const body = encodeURIComponent(
                    `Daniela,\n\nSegue em anexo o arquivo "${filename}" contendo ${ncs.length} ocorrência(s) do período ${exportDateFrom} ${exportTimeFrom} → ${exportDateTo} ${exportTimeTo}.\n\nFiscal responsável: ${fiscal}\n\nGerado pelo Sistema SGP AUDIT PLATINUM — Prefeitura de Marechal Cândido Rondon.`
                );
                window.open(`mailto:${EMAIL_DESTINO}?subject=${subj}&body=${body}`);
            }

            alert(`✅ ZIP gerado com ${ncs.length} ocorrência(s)!\n📧 Destinatário: ${EMAIL_DESTINO}`);
        } catch(e) { console.error(e); alert('Erro ao gerar ZIP: '+e.message); }
        finally { setLoading(false); }
    };

    // ── HEADER COMPONENT ──────────────────────────────────────────────────
    const Header = ({title, subtitle, showBack}) => (
        <div className="elite-header">
            <div className="flex items-center justify-between mb-8">
                {showBack ? (
                    <button onClick={() => setView('rules')} className="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center text-white active:scale-95 transition backdrop-blur-md border border-white/20">
                        <i className="fas fa-chevron-left"></i>
                    </button>
                ) : <div className="w-12"/>}
                <div className="bg-white p-3 rounded-3xl shadow-2xl rotate-3">
                    <img src="BRASÃO.jpg" className="w-16 h-16 object-contain"
                         onError={e => e.target.style.display='none'} alt="Brasão MCR"/>
                </div>
                <div className="w-12"/>
            </div>
            <div className="text-center">
                <h1 className="text-3xl font-[900] text-white uppercase tracking-tighter leading-none mb-2">{title}</h1>
                <div className="inline-block px-4 py-1.5 rounded-full bg-emerald-500/20 backdrop-blur-md border border-emerald-400/30">
                    <p className="text-[10px] font-black text-emerald-300 uppercase tracking-[0.25em]">{subtitle||'Fiscalização Técnica'}</p>
                </div>
            </div>
        </div>
    );

    // ── TELA: Seleção de Fiscal ───────────────────────────────────────────
    if (view === 'fiscal') return (
        <div className="fade-in bg-[#f1f5f9] min-h-screen">
            <div className="elite-header text-center flex flex-col items-center pb-16">
                <div className="bg-white p-6 rounded-[3rem] shadow-2xl mb-8 -rotate-3 transition hover:rotate-0 duration-500">
                    <img src="BRASÃO.jpg" className="w-24 h-24 object-contain"
                         onError={e => e.target.style.display='none'} alt="Brasão MCR"/>
                </div>
                <h1 className="text-4xl font-[900] text-white uppercase tracking-tighter">RAD FISCAL</h1>
                <div className="mt-4 px-6 py-2 rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10">
                    <p className="text-[10px] font-black text-white/60 uppercase tracking-[0.4em]">Elite Auditor v2.0</p>
                </div>
                <p className="text-[9px] font-bold text-white/30 mt-6 max-w-[250px]">Eng. Florestal Thyêgo N. A. Barreto • CREA-PR PE-048841/D</p>
            </div>
            <div className="max-w-md mx-auto p-6 flex flex-col gap-5 -mt-12">
                <div className="radpoda-card p-8 space-y-6">
                    <p className="text-center font-black text-slate-400 uppercase text-[10px] tracking-[0.2em] mb-2">Identificação Obrigatória</p>
                    <form onSubmit={e => {
                        e.preventDefault();
                        if(!loginSelect) return alert('Selecione seu nome!');
                        if(FISCAIS_AUTH[loginSelect] !== loginSenha) return alert('Senha Incorreta! Acesso negado.');
                        setFiscal(loginSelect);
                        setView('rules');
                    }} className="flex flex-col gap-6">
                        <div className="relative">
                            <i className="fas fa-user-shield absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <select value={loginSelect} onChange={e=>setLoginSelect(e.target.value)}
                                className="w-full p-5 pl-14 font-black uppercase text-slate-700 focus:ring-4 focus:ring-emerald-500/20 outline-none border-0 bg-slate-100 appearance-none text-center rounded-2xl">
                                <option value="" disabled>SELECIONE O FISCAL</option>
                                {Object.keys(FISCAIS_AUTH).map(name => <option key={name} value={name}>{name}</option>)}
                            </select>
                        </div>
                        
                        <div className="relative">
                            <i className="fas fa-key absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="password" value={loginSenha} onChange={e=>setLoginSenha(e.target.value)}
                                placeholder="SENHA"
                                className="w-full p-5 pl-14 font-black uppercase text-slate-700 w-full text-center focus:ring-4 focus:ring-emerald-500/20 outline-none text-2xl tracking-[0.5em] border-0 bg-slate-100 rounded-2xl" />
                        </div>

                        <button type="submit"
                            className="w-full bg-emerald-600 hover:bg-emerald-500 text-white rounded-[2rem] font-black text-lg uppercase py-5 shadow-2xl shadow-emerald-500/20 btn-active border-b-8 border-emerald-800 transition-all flex justify-center items-center gap-3">
                            <i className="fas fa-shield-halved"></i> Acessar Auditoria
                        </button>
                    </form>
                </div>
                
                <button onClick={() => { loadHistory(); setView('history'); }}
                    className="flex items-center justify-center gap-3 text-slate-400 font-black uppercase text-[10px] hover:text-emerald-600 transition tracking-widest py-4">

                </button>
            </div>
            <div className="mt-8 text-center opacity-20 pb-12">
                <p className="font-black text-[9px] uppercase tracking-[0.4em]">SGP AUDIT PLATINUM • OFFLINE CORE</p>
            </div>
        </div>
    );

    // ── TELA: Histórico / Exportação ──────────────────────────────────────
    if (view === 'history') return (
        <div className="fade-in bg-slate-50 min-h-screen pb-20">
            <Header title="Histórico" subtitle="Exportação Digital"/>
            <div className="max-w-md mx-auto p-6 -mt-14 space-y-6">
                <button onClick={() => setView('fiscal')} className="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black uppercase text-xs mb-2 shadow-xl active:scale-95 transition flex items-center justify-center gap-2">
                    <i className="fas fa-chevron-left"></i>Voltar ao Menu principal
                </button>

                    <div className="bg-slate-900 rounded-2xl p-4 text-center">

                            <span className="text-white opacity-40">(JSON + EXCEL)</span>
                        </p>
                    </div>

                    <button onClick={exportFiscalZip} disabled={loading}
                        className="w-full bg-emerald-600 hover:bg-emerald-500 text-white rounded-[2rem] font-black text-sm uppercase py-5 shadow-2xl shadow-emerald-500/20 btn-active border-b-8 border-emerald-800 transition-all flex justify-center items-center gap-3 disabled:opacity-50">
                        <i className={loading ? 'fas fa-spinner fa-spin' : 'fas fa-file-zipper'}></i>
                        {loading ? 'PROCESSANDO...' : 'Exportar Selo Digital'}

                    <button onClick={limparHistorico}
                        className="w-full text-red-500 font-black uppercase text-[9px] tracking-widest opacity-50 hover:opacity-100 transition py-2">
                        Deletar Registros Locais
                    </button>
                </div>

                {/* Lista do Histórico */}
                <div className="flex justify-between items-center px-2">
                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Últimas {history.length} Auditorias</h3>
                </div>
                {history.length === 0 ? (
                    <div className="radpoda-card p-12 text-center opacity-50">
                        <i className="fas fa-box-open text-slate-300 text-5xl mb-4"></i>
                        <p className="text-slate-400 font-black uppercase text-[10px]">Sem dados em cache</p>
                    </div>
                ) : (
                    <div className="space-y-4">
                        {history.map((item,idx) => {
                            const rule = GLOSA_RULES.find(r=>r.id===item.rule_id)||{};
                            return (
                                <div key={idx} className="radpoda-card p-5 group flex gap-4 transition hover:ring-2 hover:ring-emerald-500/20">
                                    <div className="w-16 h-16 bg-slate-100 rounded-2xl overflow-hidden shrink-0 shadow-inner border border-slate-200">
                                        {item.fotosBase64?.[0] ? <img src={item.fotosBase64[0]} className="w-full h-full object-cover" alt=""/> : <div className="w-full h-full flex items-center justify-center"><i className="fas fa-image text-slate-300"></i></div>}
                                    </div>
                                    <div className="flex-1 min-w-0 flex flex-col justify-between py-0.5">
                                        <div className="flex justify-between items-start">
                                            <span className="text-[10px] font-[900] text-slate-900 uppercase truncate">{item.categoria}</span>
                                            <span className="text-[8px] font-black text-slate-400 shrink-0 ml-4 font-mono">{new Date(item.timestamp).toLocaleDateString('pt-BR')}</span>
                                        </div>
                                        <p className="text-[9px] text-slate-500 font-medium line-clamp-1 italic mb-2">"{item.observacao}"</p>
                                        <div className="flex justify-between items-center">
                                            <span className="status-badge bg-red-50 text-red-600 border border-red-100">Item {item.rule_id} • {rule.glosa}</span>
                                            <i className="fas fa-shield-check text-emerald-500 text-xs"></i>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                )}
            </div>
        </div>
    );

    // ── TELA: Menu de Regras ──────────────────────────────────────────────
    if (view === 'rules') {
        const groups = ['CONFORMIDADE','QUALIDADE','SEGURANÇA','GESTÃO','CONTROLE'];
        const glabels = {'CONFORMIDADE':'Parecer Favorável','QUALIDADE':'Padrão Técnico','SEGURANÇA':'Segurança / EPI','GESTÃO':'Administrativo','CONTROLE':'Rastreabilidade'};
        const gicons  = {'CONFORMIDADE':'fa-check-double','QUALIDADE':'fa-tree-city','SEGURANÇA':'fa-user-shield','GESTÃO':'fa-file-signature','CONTROLE':'fa-satellite'};
        const gcolors = {'CONFORMIDADE':'#3b82f6','QUALIDADE':'#10b981','SEGURANÇA':'#ef4444','GESTÃO':'#f59e0b','CONTROLE':'#6366f1'};
        return (
            <div className="fade-in bg-slate-50 min-h-screen pb-16">
                <Header title="Auditoria" subtitle={`Fiscal: ${fiscal}`}/>
                <div className="max-w-md mx-auto p-6 -mt-16 space-y-10">
                    {groups.map(grp => (
                        <div key={grp} className="space-y-4">
                            <div className="flex items-center gap-4 px-2">
                                <div className="w-10 h-10 rounded-2xl flex items-center justify-center text-white text-sm shadow-xl"
                                     style={{backgroundColor:gcolors[grp], background: `linear-gradient(135deg, ${gcolors[grp]} 0%, ${gcolors[grp]}dd 100%)`}}>
                                    <i className={`fas ${gicons[grp]}`}></i>
                                </div>
                                <div>
                                    <h2 className="font-[900] text-slate-900 uppercase tracking-tighter text-lg">{glabels[grp]}</h2>
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">{grp}</p>
                                </div>
                            </div>
                            <div className="space-y-3">
                                {GLOSA_RULES.filter(r=>r.group===grp).map(rule => {
                                    const isSevere  = rule.glosa==='8.00%';
                                    const isConform = rule.id === 99;
                                    return (
                                        <button key={rule.id} onClick={()=>{
                                            setVisitaData(nowDate()); setVisitaHora(nowTime());
                                            setGlosaFimData(nowDate()); setGlosaFimHora('18:00');
                                            setGlosaOS(''); setGlosaUnid('');
                                            setSelectedRule(rule); setView('details');
                                        }}
                                            className={`radpoda-card rule-card p-6 text-left btn-active w-full flex flex-col gap-2 ${isSevere?'pulse-severe':''}`}
                                            style={{borderLeftColor:isConform?'#3b82f6':gcolors[grp]}}>
                                            <div className="flex justify-between items-center">
                                                <span className={`status-badge ${
                                                    isSevere?'bg-red-600 text-white shadow-lg shadow-red-500/20':isConform?'bg-blue-600 text-white':'bg-slate-100 text-slate-600'
                                                }`}>
                                                    {isSevere?'GRAVÍSSIMA':isConform?'ATESTE':(`Regra ${rule.id}`)} • {rule.glosa}
                                                </span>
                                                {isSevere && <i className="fas fa-triangle-exclamation text-red-600 animate-pulse"></i>}
                                                {isConform && <i className="fas fa-shield-check text-blue-600"></i>}
                                            </div>
                                            <p className="font-black text-slate-800 text-base leading-tight uppercase tracking-tight">{rule.cat}</p>

                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    ))}
                    
                    <button onClick={()=>{loadHistory();setView('history');}}
                        className="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 py-4 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2 transition">
                        <i className="fas fa-clock-rotate-left"></i> Histórico e Exportação
                    </button>

        );
    }

    // ── TELA: Detalhes / Formulário da Glosa ─────────────────────────────
    if (view === 'details') return (
        <div className="fade-in bg-slate-50 min-h-screen pb-32">
            <Header title="Evidências" subtitle={selectedRule.cat} showBack={true}/>
            <div className="max-w-md mx-auto p-6 -mt-16 space-y-6">
                {/* Card da Regra */}
                <div className="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden border-b-8 border-slate-800">
                    <div className="absolute top-0 right-0 p-6 opacity-5"><i className="fas fa-gavel text-8xl rotate-12"></i></div>
                    <p className="text-[10px] font-black text-emerald-400 uppercase mb-3 tracking-widest">Regra {selectedRule.id} • {selectedRule.glosa}</p>
                    <h2 className="font-[900] text-xl leading-tight uppercase mb-4 tracking-tighter">{selectedRule.cat}</h2>
                    <p className="text-[11px] opacity-60 font-medium leading-relaxed italic">{selectedRule.desc}</p>
                </div>

                {/* Guia de Auditoria */}
                <div className="bg-amber-50 border-2 border-amber-100 p-6 rounded-[2rem] relative">
                    <div className="absolute -top-3 left-8 bg-amber-400 text-amber-950 px-4 py-1 rounded-full text-[9px] font-black uppercase tracking-widest shadow-md">
                        <i className="fas fa-bullseye-arrow mr-1"></i> Foco da Auditoria
                    </div>
                    <p className="text-[11px] text-amber-900 font-bold leading-relaxed">{selectedRule.howTo}</p>
                </div>

                {/* GPS STATUS — IMPACTO VISUAL */}
                <div className={`p-6 rounded-[2rem] shadow-xl border-2 transition-all duration-500 ${
                    gps.status==='ok' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : gps.status==='searching' ? 'bg-amber-50 text-amber-700 border-amber-200 animate-pulse' : 'bg-red-50 text-red-700 border-red-200'
                }`}>
                    <div className="flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 shadow-lg ${
                                gps.status==='ok' ? 'bg-emerald-500 text-white' : gps.status==='searching' ? 'bg-amber-500 text-white' : 'bg-red-500 text-white'
                            }`}>
                                <i className={`fas ${gps.status==='ok'?'fa-location-dot':gps.status==='searching'?'fa-satellite-dish fa-spin':'fa-location-xmark'} text-lg`}></i>
                            </div>
                            <div>
                                <span className="text-[10px] font-black uppercase block tracking-widest mb-1">
                                    {gps.status==='ok' ? 'Coordenadas Oficiais' : gps.status==='searching' ? 'Buscando Satélites...' : 'Sinal Interrompido'}
                                </span>
                                <span className="text-xs font-[900] block text-slate-900 font-mono tracking-tighter">
                                    {gps.lat ? `${gps.lat}, ${gps.lng}` : 'LAT, LNG N/D'}
                                </span>
                            </div>
                        </div>
                        <button onClick={requestGps}
                            className="w-10 h-10 rounded-xl bg-white/50 flex items-center justify-center text-slate-600 hover:bg-white transition active:scale-95 shadow-sm">
                            <i className="fas fa-rotate"></i>
                        </button>
                    </div>
                </div>

                {/* Localização */}
                <div className="space-y-2">
                    <label className="block text-[10px] font-[900] text-slate-400 uppercase tracking-widest ml-4">Localização / Logradouro</label>
                    <div className="relative">
                        <i className={`fas ${enderecoLoading ? 'fa-spinner fa-spin text-emerald-500' : 'fa-map-pin text-slate-400'} absolute left-5 top-1/2 -translate-y-1/2`}></i>
                        <input type="text" value={endereco} onChange={e=>setEndereco(e.target.value)}
                            className="w-full p-5 pl-14 text-sm font-black uppercase bg-white border-0 shadow-sm rounded-2xl focus:ring-4 focus:ring-emerald-500/10 outline-none"
                            placeholder="ENDEREÇO DA OCORRÊNCIA"/>
                    </div>
                </div>

                {/* Relato Fiscal */}
                <div className="space-y-2">
                    <label className="block text-[10px] font-[900] text-slate-400 uppercase tracking-widest ml-4">Relato da Irregularidade</label>
                    <textarea value={relato} onChange={e=>setRelato(e.target.value)}
                        className="w-full p-6 text-sm font-black uppercase bg-white border-0 shadow-sm rounded-[2rem] focus:ring-4 focus:ring-emerald-500/10 outline-none min-h-[140px]"
                        placeholder="DESCREVA O QUE FOI OBSERVADO EM CAMPO..."/>

                {/* Fotos de Evidência */}
                <div className="space-y-3">
                    <label className="block text-[10px] font-[900] text-slate-400 uppercase tracking-widest ml-4">Evidências Fotográficas (Mínimo 1)</label>

                                {fotos[i]
                                    ? <img src={fotos[i]} className="w-full h-full object-cover" alt=""/>
                                    : <div className="text-center">
                                        <i className="fas fa-camera text-slate-300 text-3xl mb-2 group-hover:text-emerald-400 transition-colors"></i>
                                        <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">FOTO {i+1}</p>
                                      </div>
                                }
                                <input type="file" accept="image/*" className="hidden"
                                    onChange={e => e.target.files[0] && processPhoto(e.target.files[0], i)}/>
                            </label>
                        ))}
                    </div>
                </div>

                {/* Período e Referência */}
                {selectedRule.id !== 99 && (
                <div className="radpoda-card p-8 space-y-6 bg-slate-50/50">
                    <div className="grid grid-cols-2 gap-6">
                        <div className="space-y-2">
                            <label className="block text-[8px] font-black text-emerald-600 uppercase tracking-widest"><i className="fas fa-clock mr-1"></i>Início</label>
                            <input type="time" value={visitaHora} onChange={e=>setVisitaHora(e.target.value)}
                                className="w-full p-4 text-xs font-black bg-white border-0 shadow-sm rounded-xl outline-none"/>
                        </div>
                        <div className="space-y-2">
                            <label className="block text-[8px] font-black text-red-500 uppercase tracking-widest"><i className="fas fa-stopwatch mr-1"></i>Fim Glosa</label>
                            <input type="time" value={glosaFimHora} onChange={e=>setGlosaFimHora(e.target.value)}
                                className="w-full p-4 text-xs font-black bg-white border-0 shadow-sm rounded-xl outline-none"/>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-6 pt-2">
                        <div className="space-y-index">
                            <label className="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Protocolo / OS</label>
                            <input type="text" value={glosaOS} onChange={e=>setGlosaOS(e.target.value)}
                                className="w-full p-4 text-xs font-black bg-white border-0 shadow-sm rounded-xl outline-none uppercase"
                                placeholder="666/2026"/>
                        </div>
                        <div className="space-y-index">
                            <label className="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">ID Árvore / Unid</label>
                            <input type="text" value={glosaUnid} onChange={e=>setGlosaUnid(e.target.value)}
                                className="w-full p-4 text-xs font-black bg-white border-0 shadow-sm rounded-xl outline-none uppercase"
                                placeholder="UNID 03"/>
                        </div>
                    </div>
                </div>
                )}
            </div>

            {/* BOTÃO FIXO ELITE */}
            <div className="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-50 to-transparent pointer-events-none">
                <div className="max-w-md mx-auto pointer-events-auto">
                    {gps.status !== 'ok' && (
                        <div className="bg-red-600 text-white text-center text-[10px] font-black uppercase py-2.5 px-6 rounded-2xl mb-4 shadow-2xl animate-bounce">
                            <i className="fas fa-location-arrow mr-2"></i> AGUARDANDO SINAL GPS OBRIGATÓRIO
                        </div>
                    )}
                    <button 
                        disabled={loading || !relato.trim() || fotos.filter(Boolean).length===0 || gps.status!=='ok'} 
                        onClick={sendVistoria}
                        className="w-full py-6 bg-emerald-600 text-white rounded-[2.5rem] font-black text-xl uppercase shadow-2xl shadow-emerald-600/30 btn-active disabled:bg-slate-300 disabled:shadow-none flex items-center justify-center gap-4 border-b-8 border-emerald-800 transition-all hover:bg-emerald-500">
                        {loading ? <i className="fas fa-circle-notch fa-spin"></i> : <i className="fas fa-paper-plane"></i>}
                        {loading ? 'ENVIANDO...' : (selectedRule.id===99 ? 'Atestar Conformidade' : 'Validar Irregularidade')}
                    </button>
                </div>
            </div>
        </div>
    );

    // ── TELA: Sucesso ────────────────────────────────────────────────────
    if (view === 'success') return (
        <div className="min-h-screen bg-emerald-600 flex flex-col items-center justify-center p-8 text-center text-white fade-in">
            <div className="w-28 h-28 bg-white/20 rounded-full flex items-center justify-center mb-8 backdrop-blur-md">
                <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-2xl">
                    <i className="fas fa-check text-4xl text-emerald-600"></i>
                </div>
            </div>
            <h1 className="text-4xl font-black mb-4 uppercase tracking-tighter italic">{selectedRule?.id===99 ? 'Vistoria Conforme Salva!' : 'Glosa Registrada!'}</h1>
            <p className="opacity-90 mb-4 font-bold max-w-[240px]">Registro salvo localmente com sucesso.</p>
            <p className="text-[11px] opacity-70 mb-10">Use o <strong>Histórico e Exportação</strong> para gerar o ZIP e enviar para a Daniela.</p>
            <div className="flex flex-col gap-3 w-full max-w-xs">
                <button onClick={()=>{loadHistory();setView('history');}}
                    className="radpoda-card w-full bg-white text-emerald-600 py-5 font-black uppercase text-sm shadow-2xl btn-active flex items-center justify-center gap-2">
                    <i className="fas fa-file-zipper"></i> Exportar Agora
                </button>
                <button onClick={()=>{setRelato('');setEndereco('');setFotos([null,null,null]);setSelectedRule(null);setView('rules');}}
                    className="w-full bg-emerald-700 text-white py-4 font-black uppercase text-sm rounded-2xl btn-active flex items-center justify-center gap-2">
                    <i className="fas fa-plus"></i> {selectedRule?.id===99 ? 'Nova Vistoria' : 'Nova Glosa'}
                </button>
                <button onClick={()=>{setRelato('');setEndereco('');setFotos([null,null,null]);setSelectedRule(null);setView('fiscal');}}
                    className="text-white/70 font-bold uppercase text-xs py-2">
                    Menu Principal
                </button>
            </div>
        </div>
    );

    return null;
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
